<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Music Explorer — pict-dataexplorer</title>
		<link rel="stylesheet" href="./music-explorer.css" />
		<!-- PICT Dynamic View CSS Container -->
		<style id="PICT-CSS"></style>
		<!-- Load the PICT library (root path so docs staging can externalize it to the CDN) -->
		<script src="https://cdn.jsdelivr.net/npm/pict@1/dist/pict.min.js" type="text/javascript"></script>
		<!-- Bootstrap the application -->
		<script type="text/javascript">
//<![CDATA[
		Pict.safeOnDocumentReady(() => { Pict.safeLoadPictApplication(MusicExplorer, 2); });
//]]>
		</script>
	</head>
	<body>
		<!-- Pict Example Header -->
		<div class="pict-example-header">
			<div class="pict-example-badge">
				<svg viewBox="0 0 16 16"><polygon points="8,1 10,6 16,6 11,9.5 13,15 8,11.5 3,15 5,9.5 0,6 6,6"/></svg>
				Pict Example
			</div>
			<div class="pict-example-app-name">Music Explorer</div>
			<div class="pict-example-module">pict-dataexplorer</div>
		</div>
		<div class="dex-wrap">
			<p class="dex-sub">
				<strong>pict-dataexplorer</strong> with <strong>no backend</strong> — Artists → Albums → Tracks
				resolved entirely from an in-memory dataset through custom <code>Resolver</code> functions.
				Expand a row to drill in; click the <span class="dex-i">ⓘ</span> on any record for its preview card.
			</p>
			<div id="MusicExplorer" class="dex-host"></div>
		</div>
		<!-- The application bundle (built by quack from source/Music-Explorer-Application.js) -->
		<script src="./music_explorer.compatible.min.js" type="text/javascript"></script>
	</body>
</html>
